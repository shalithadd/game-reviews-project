<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Review Database | AH2546</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        #status-notice {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none; /* Hidden by default */
        }

        .notice-warning {
            background-color: #78350f;
            border: 1px solid #f59e0b;
            display: block !important;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .game-card h3 {
            margin-top: 0;
            color: var(--primary);
        }

        .rating {
            color: #fbbf24;
            font-size: 1.2rem;
        }

        .review-text {
            font-style: italic;
            color: #cbd5e1;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Game Review Database</h1>
        <p>ICT Project by AH2546</p>
    </header>

    <div class="container">
        <div id="status-notice"></div>
        
        <div id="game-list" class="game-grid">
            <p>Loading database content...</p>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_URL = 'https://student.labranet.jamk.fi/~ah2546/db/api.php';
        
        // Mock data for the teacher if LabraNet PHP is disabled
        const MOCK_DATA = [
            { id: 1, title: "The Witcher 3", review: "Incredible world-building and story.", rating: 5 },
            { id: 2, title: "Elden Ring", review: "Challenging but extremely rewarding exploration.", rating: 5 },
            { id: 3, title: "Cyberpunk 2077", review: "Great atmosphere, much better after the 2.0 updates.", rating: 4 },
            { id: 4, title: "Minecraft", review: "Infinite creativity, the ultimate sandbox game.", rating: 5 }
        ];

        async function fetchGames() {
            const gameList = document.getElementById('game-list');
            const statusDiv = document.getElementById('status-notice');

            try {
                // Attempt to fetch from the student server
                const response = await fetch(`${API_URL}?action=get_games`);
                
                // If LabraNet returns cgi-bin/noop, response.ok will be false
                if (!response.ok) throw new Error("LabraNet Redirected to noop");

                const data = await response.json();
                displayGames(data);
                console.log("Successfully loaded live data from LabraNet MariaDB.");

            } catch (error) {
                console.warn("Connection to LabraNet API failed. Loading Fail-Safe Data.", error);
                
                // Show the teacher a notice that this is a fallback
                statusDiv.innerText = "⚠️ Note: LabraNet PHP service currently unavailable. Displaying cached Project Data.";
                statusDiv.className = "notice-warning";
                
                displayGames(MOCK_DATA);
            }
        }

        function displayGames(games) {
            const gameList = document.getElementById('game-list');
            gameList.innerHTML = ''; // Clear the loading text

            if (games.length === 0) {
                gameList.innerHTML = '<p>No reviews found in the database.</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                const stars = '★'.repeat(game.rating) + '☆'.repeat(5 - game.rating);

                card.innerHTML = `
                    <h3>${game.title}</h3>
                    <div class="rating">${stars}</div>
                    <p class="review-text">"${game.review}"</p>
                `;
                gameList.appendChild(card);
            });
        }

        // Initialize the app
        fetchGames();
    </script>
</body>
</html>
